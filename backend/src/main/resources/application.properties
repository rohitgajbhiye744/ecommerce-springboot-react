spring.application.name=backend

# Database - values injected via environment variables (set in Railway dashboard)
# Local dev defaults are provided after the colon
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Ecommerce_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:4854}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Server port — Railway injects PORT automatically
server.port=${PORT:8083}
